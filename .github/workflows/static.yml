# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Prepare site with Cloudflare Web Analytics
        env:
          CF_WEB_ANALYTICS_TOKEN: ${{ secrets.CF_WEB_ANALYTICS_TOKEN }}
        run: |
          cp -r source/html/barrybecker4 deploy-site
          cp robots.txt deploy-site/
          # Keep archived screenplays out of the live site even if reintroduced under source/
          rm -f deploy-site/movies/alien/alien_screenplay*.html
          python3 scripts/inject_cloudflare_analytics.py deploy-site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy-site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
