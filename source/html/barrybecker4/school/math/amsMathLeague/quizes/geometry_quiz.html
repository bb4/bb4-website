<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geometry Quest — 7th Grade</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e17;
    --surface: #1a1828;
    --card: #221f35;
    --accent: #ff6b35;
    --accent2: #a8dadc;
    --accent3: #e9c46a;
    --text: #fffffe;
    --muted: #a7a3c0;
    --correct: #52b788;
    --wrong: #e63946;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(168,218,220,0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(255,107,53,0.07) 0%, transparent 50%);
  }

  header {
    text-align: center;
    padding: 60px 20px 30px;
    position: relative;
  }

  header .eyebrow {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 12px;
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(2.8rem, 7vw, 5rem);
    font-weight: 900;
    line-height: 1;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  header h1 span {
    color: var(--accent);
  }

  header p {
    color: var(--muted);
    margin-top: 14px;
    font-size: 1.05rem;
    max-width: 520px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.6;
  }

  .progress-bar-wrap {
    max-width: 680px;
    margin: 24px auto 0;
    background: var(--surface);
    border-radius: 99px;
    height: 6px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    border-radius: 99px;
    transition: width 0.4s ease;
    width: 0%;
  }

  .quiz-container {
    max-width: 720px;
    margin: 0 auto;
    padding: 20px 20px 80px;
  }

  .question-card {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: var(--radius);
    padding: 32px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s ease;
    animation: slideIn 0.4s ease both;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 4px;
    height: 100%;
    background: linear-gradient(180deg, var(--accent2), var(--accent));
    border-radius: 4px 0 0 4px;
  }

  .q-number {
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 10px;
  }

  .q-text {
    font-family: 'Fraunces', serif;
    font-size: 1.2rem;
    font-weight: 700;
    line-height: 1.45;
    color: var(--text);
    margin-bottom: 20px;
  }

  .q-hint {
    font-size: 0.85rem;
    color: var(--muted);
    font-style: italic;
    margin-bottom: 16px;
    margin-top: -10px;
  }

  .choices {
    display: grid;
    gap: 10px;
  }

  .choice-label {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 18px;
    border-radius: 10px;
    background: var(--surface);
    border: 1.5px solid rgba(255,255,255,0.07);
    cursor: pointer;
    transition: all 0.18s ease;
    font-size: 0.95rem;
    line-height: 1.5;
  }

  .choice-label:hover {
    border-color: var(--accent2);
    background: rgba(168,218,220,0.06);
  }

  .choice-label input[type="radio"] {
    display: none;
  }

  .choice-bubble {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 700;
    color: var(--muted);
    transition: all 0.18s ease;
    margin-top: 1px;
  }

  .choice-label.selected {
    border-color: var(--accent2);
    background: rgba(168,218,220,0.1);
  }

  .choice-label.selected .choice-bubble {
    background: var(--accent2);
    border-color: var(--accent2);
    color: #0f0e17;
  }

  /* Post-submit states */
  .choice-label.correct-answer {
    border-color: var(--correct) !important;
    background: rgba(82,183,136,0.12) !important;
  }

  .choice-label.correct-answer .choice-bubble {
    background: var(--correct);
    border-color: var(--correct);
    color: #fff;
  }

  .choice-label.wrong-answer {
    border-color: var(--wrong) !important;
    background: rgba(230,57,70,0.1) !important;
    opacity: 0.8;
  }

  .choice-label.wrong-answer .choice-bubble {
    background: var(--wrong);
    border-color: var(--wrong);
    color: #fff;
  }

  .explanation {
    display: none;
    margin-top: 16px;
    padding: 16px;
    border-radius: 10px;
    background: rgba(233,196,106,0.08);
    border: 1px solid rgba(233,196,106,0.25);
    font-size: 0.9rem;
    line-height: 1.65;
    color: var(--text);
    animation: fadeIn 0.3s ease;
  }

  .explanation .exp-label {
    color: var(--accent3);
    font-weight: 600;
    font-size: 0.78rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 6px;
    display: block;
  }

  .explanation.correct-exp {
    background: rgba(82,183,136,0.08);
    border-color: rgba(82,183,136,0.25);
  }

  .explanation.correct-exp .exp-label {
    color: var(--correct);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .svg-figure {
    display: block;
    margin: 14px auto 20px;
  }

  /* Submit */
  .submit-wrap {
    text-align: center;
    padding: 10px 0 30px;
  }

  #submit-btn {
    font-family: 'Fraunces', serif;
    font-size: 1.15rem;
    font-weight: 700;
    padding: 18px 52px;
    background: linear-gradient(135deg, var(--accent), #ff9b6b);
    color: #fff;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: 0 8px 28px rgba(255,107,53,0.35);
    letter-spacing: 0.01em;
  }

  #submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 36px rgba(255,107,53,0.45);
  }

  #submit-btn:active { transform: scale(0.97); }
  #submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Score panel */
  #score-panel {
    display: none;
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: var(--radius);
    padding: 48px 40px;
    text-align: center;
    margin: 30px 0;
    animation: slideIn 0.5s ease;
  }

  #score-panel .score-eyebrow {
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  #score-panel .score-num {
    font-family: 'Fraunces', serif;
    font-size: clamp(4rem, 12vw, 7rem);
    font-weight: 900;
    line-height: 1;
    color: var(--accent);
  }

  #score-panel .score-denom {
    font-size: 1.4rem;
    color: var(--muted);
    font-family: 'Fraunces', serif;
    margin-bottom: 16px;
  }

  #score-panel .score-msg {
    font-size: 1.1rem;
    color: var(--muted);
    line-height: 1.6;
  }

  #score-panel .retry-btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    padding: 13px 32px;
    background: transparent;
    color: var(--accent2);
    border: 1.5px solid var(--accent2);
    border-radius: 50px;
    cursor: pointer;
    transition: all 0.18s ease;
    margin-top: 24px;
    display: inline-block;
  }

  #score-panel .retry-btn:hover {
    background: rgba(168,218,220,0.1);
  }

  .result-icon {
    font-size: 2rem;
    margin-bottom: 8px;
  }

  .unanswered-warning {
    display: none;
    color: var(--wrong);
    font-size: 0.9rem;
    margin-top: 12px;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">7th Grade · Geometry</div>
  <h1>Geo<span>metry</span><br>Quest</h1>
  <p>10 questions covering the core concepts of 7th grade geometry. Take your time, think carefully, and submit when you're ready.</p>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progress-fill"></div>
  </div>
</header>

<div class="quiz-container">
  <div id="score-panel">
    <div class="result-icon" id="score-icon"></div>
    <div class="score-eyebrow">Your Score</div>
    <div class="score-num" id="score-num">0</div>
    <div class="score-denom" id="score-denom">/ 10</div>
    <div class="score-msg" id="score-msg"></div>
    <button class="retry-btn" onclick="resetQuiz()">Try Again</button>
  </div>

  <div id="quiz-body">
    <!-- Questions injected by JS -->
  </div>

  <div class="submit-wrap">
    <button id="submit-btn" onclick="submitQuiz()">Grade My Quiz →</button>
    <div class="unanswered-warning" id="warn-msg">⚠ Please answer all questions before submitting.</div>
  </div>
</div>

<script>
const questions = [
  {
    text: "A skateboard ramp forms a right triangle. The two legs measure 6 ft and 8 ft. How long is the ramp (the hypotenuse)?",
    hint: "Pythagorean theorem: a² + b² = c²",
    choices: ["12 ft", "10 ft", "14 ft", "7 ft"],
    answer: 1,
    explanation: "Using the Pythagorean theorem: 6² + 8² = 36 + 64 = 100, and √100 = 10 ft. The 3-4-5 ratio scaled by 2 gives us 6-8-10 — a classic right triangle!"
  },
  {
    text: "A pepperoni pizza is cut into 8 equal slices. The full pizza has a radius of 7 inches. What is the area of ONE slice? (Use π ≈ 3.14)",
    hint: "Area of full circle = πr², then divide by the number of slices.",
    choices: ["19.23 in²", "153.86 in²", "38.46 in²", "12.5 in²"],
    answer: 0,
    explanation: "Full pizza area = π × 7² = 3.14 × 49 ≈ 153.86 in². One slice = 153.86 ÷ 8 ≈ 19.23 in². Each slice is a sector — 1/8th of the full circle."
  },
  {
    text: "Two streets meet and form angles. If one angle is 130°, what is its supplementary angle?",
    hint: "Supplementary angles add up to 180°.",
    choices: ["70°", "50°", "40°", "130°"],
    answer: 1,
    explanation: "Supplementary angles sum to 180°. So 180° − 130° = 50°. Think of it as a straight line being split into two parts."
  },
  {
    text: "A rectangular soccer field is 100 m long and 60 m wide. The coach wants to add a diagonal stripe across it. How long is that diagonal?",
    hint: "The diagonal divides the rectangle into two right triangles.",
    choices: ["160 m", "116.6 m", "80 m", "136 m"],
    answer: 1,
    explanation: "Diagonal = √(100² + 60²) = √(10000 + 3600) = √13600 ≈ 116.6 m. The diagonal of a rectangle is just the hypotenuse of the right triangle formed by the length and width."
  },
  {
    text: "Which of these quadrilaterals ALWAYS has four right angles AND four equal sides?",
    hint: "Think about what makes a square different from a rectangle or rhombus.",
    choices: ["Rectangle", "Rhombus", "Parallelogram", "Square"],
    answer: 3,
    explanation: "A square has all four right angles (like a rectangle) AND all four equal sides (like a rhombus). A rectangle has right angles but not necessarily equal sides; a rhombus has equal sides but not necessarily right angles."
  },
  {
    text: "A city park is shaped like a triangle with a base of 40 m and a height of 25 m. The city wants to put a fence around the whole park. They know the two equal sides each measure 27 m. What is the perimeter?",
    hint: "Perimeter = sum of all three sides.",
    choices: ["94 m", "81 m", "107 m", "500 m"],
    answer: 0,
    explanation: "Perimeter = base + side + side = 40 + 27 + 27 = 94 m. The height (25 m) is only used for area, not perimeter — don't let that extra number trick you!"
  },
  {
    text: "Two lines cross and form four angles. One of the angles is 45°. What are the other three angles?",
    hint: "Think: vertical angles and supplementary angles.",
    choices: [
      "45°, 45°, 45° (all equal)",
      "135°, 45°, 135°",
      "90°, 90°, 45°",
      "135°, 135°, 45°"
    ],
    answer: 1,
    explanation: "When two lines intersect, vertical (opposite) angles are equal, and adjacent angles are supplementary (add to 180°). So: 45°, then 180°−45°=135°, then 45° again (vertical to first), then 135° (vertical to second)."
  },
  {
    text: "A cylindrical water tower has a circular base with diameter 10 ft. What is the circumference of its base? (Use π ≈ 3.14)",
    hint: "Circumference = πd, and radius = diameter ÷ 2.",
    choices: ["31.4 ft", "78.5 ft", "15.7 ft", "62.8 ft"],
    answer: 0,
    explanation: "Circumference = π × diameter = 3.14 × 10 = 31.4 ft. No need to use radius here — C = πd is the direct formula when you have the diameter!"
  },
  {
    text: "A triangle has angles measuring 55° and 75°. What is the third angle?",
    hint: "All three angles in any triangle always add up to exactly 180°.",
    choices: ["60°", "40°", "50°", "70°"],
    answer: 2,
    explanation: "Triangle Angle Sum = 180°. So the third angle = 180° − 55° − 75° = 50°. This rule works for every triangle, no matter the shape or size."
  },
  {
    text: "A classroom floor tile is a regular hexagon (6 equal sides) with each side measuring 5 cm. A student says the perimeter is 25 cm. What mistake did they make?",
    hint: "A regular hexagon has 6 equal sides, not 5.",
    choices: [
      "They used the wrong formula — it should be 5 × π",
      "They multiplied by 5 sides instead of 6 — the correct perimeter is 30 cm",
      "They forgot to square the side length — it should be 5² = 25 cm²",
      "There is no mistake; 25 cm is correct"
    ],
    answer: 1,
    explanation: "A regular polygon's perimeter = number of sides × side length. A hexagon has 6 sides, so 6 × 5 = 30 cm. The student multiplied by 5 (perhaps confusing it with a pentagon). Always count the sides carefully!"
  }
];

let answered = new Array(questions.length).fill(null);

function buildQuiz() {
  const container = document.getElementById('quiz-body');
  container.innerHTML = '';
  answered = new Array(questions.length).fill(null);
  updateProgress();

  questions.forEach((q, qi) => {
    const letters = ['A','B','C','D'];
    const card = document.createElement('div');
    card.className = 'question-card';
    card.style.animationDelay = `${qi * 0.06}s`;

    let choicesHTML = q.choices.map((c, ci) => `
      <label class="choice-label" id="lbl-${qi}-${ci}">
        <input type="radio" name="q${qi}" value="${ci}" onchange="selectChoice(${qi}, ${ci})">
        <span class="choice-bubble" id="bubble-${qi}-${ci}">${letters[ci]}</span>
        <span>${c}</span>
      </label>
    `).join('');

    card.innerHTML = `
      <div class="q-number">Question ${qi + 1} of ${questions.length}</div>
      <div class="q-text">${q.text}</div>
      ${q.hint ? `<div class="q-hint">💡 Hint: ${q.hint}</div>` : ''}
      <div class="choices" id="choices-${qi}">${choicesHTML}</div>
      <div class="explanation" id="exp-${qi}">
        <span class="exp-label">Explanation</span>
        <span id="exp-text-${qi}"></span>
      </div>
    `;

    container.appendChild(card);
  });
}

function selectChoice(qi, ci) {
  answered[qi] = ci;
  // Update visual selection
  questions[qi].choices.forEach((_, i) => {
    const lbl = document.getElementById(`lbl-${qi}-${i}`);
    lbl.classList.toggle('selected', i === ci);
  });
  updateProgress();
}

function updateProgress() {
  const done = answered.filter(a => a !== null).length;
  document.getElementById('progress-fill').style.width = `${(done / questions.length) * 100}%`;
}

function submitQuiz() {
  // Check all answered
  if (answered.includes(null)) {
    const warn = document.getElementById('warn-msg');
    warn.style.display = 'block';
    const firstUnanswered = answered.indexOf(null);
    document.querySelectorAll('.question-card')[firstUnanswered].scrollIntoView({ behavior: 'smooth', block: 'center' });
    return;
  }
  document.getElementById('warn-msg').style.display = 'none';

  let score = 0;

  questions.forEach((q, qi) => {
    const selected = answered[qi];
    const correct = q.answer;
    const expEl = document.getElementById(`exp-${qi}`);
    const expText = document.getElementById(`exp-text-${qi}`);

    // Disable all choices
    q.choices.forEach((_, ci) => {
      const lbl = document.getElementById(`lbl-${qi}-${ci}`);
      lbl.style.cursor = 'default';
      lbl.style.pointerEvents = 'none';
      lbl.classList.remove('selected');

      if (ci === correct) {
        lbl.classList.add('correct-answer');
        document.getElementById(`bubble-${qi}-${ci}`).textContent = '✓';
      }
    });

    if (selected === correct) {
      score++;
      expEl.classList.add('correct-exp');
      expEl.querySelector('.exp-label').textContent = '✓ Correct!';
    } else {
      const wrongLbl = document.getElementById(`lbl-${qi}-${selected}`);
      wrongLbl.classList.add('wrong-answer');
      document.getElementById(`bubble-${qi}-${selected}`).textContent = '✗';
      expEl.querySelector('.exp-label').textContent = '✗ Not quite — here\'s why:';
    }

    expText.textContent = q.explanation;
    expEl.style.display = 'block';
  });

  // Show score panel
  const panel = document.getElementById('score-panel');
  const pct = score / questions.length;
  let msg, icon;
  if (pct === 1)       { msg = "Perfect score! You're a geometry genius. 🔥";    icon = "🏆"; }
  else if (pct >= 0.8) { msg = "Excellent work! You've got a strong grasp of geometry.";  icon = "⭐"; }
  else if (pct >= 0.6) { msg = "Good effort! Review the explanations and you'll nail it next time."; icon = "📐"; }
  else if (pct >= 0.4) { msg = "Keep practicing! Go back and read the explanations carefully."; icon = "📖"; }
  else                 { msg = "Don't give up! Every mathematician starts somewhere. Study those hints!"; icon = "💪"; }

  document.getElementById('score-icon').textContent = icon;
  document.getElementById('score-num').textContent = score;
  document.getElementById('score-denom').textContent = `/ ${questions.length}`;
  document.getElementById('score-msg').textContent = msg;
  panel.style.display = 'block';

  document.getElementById('submit-btn').disabled = true;
  panel.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function resetQuiz() {
  document.getElementById('score-panel').style.display = 'none';
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('warn-msg').style.display = 'none';
  buildQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// Init
buildQuiz();
</script>
</body>
</html>
