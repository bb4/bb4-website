<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Into the Singularity</title>
    <style>
        /* Remove all scrollbars and padding to make the iframe seamless */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000; /* Matches typical game backgrounds */
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

<iframe
        src="https://into-the-singularity.pages.dev"
        allow="autoplay; fullscreen; keyboard; gamepad"
        loading="lazy">
</iframe>

</body>
</html>
